<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Room - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Assign Room</h2>
        </div>
        <div class="custom-table-card p-4">
            <form id="assignForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Select Student</label>
                    <select id="studentSelect" class="form-select"></select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Select Room</label>
                    <select id="roomSelect" class="form-select"></select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-premium px-4">Assign Room</button>
                </div>
            </form>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
            renderSidebar('Rooms', 'admin');
            renderTopNav(user.name);
            const token = localStorage.getItem('authToken') || localStorage.getItem('token');
            const studentsSel = document.getElementById('studentSelect');
            const roomsSel = document.getElementById('roomSelect');
            const studentsData = await apiAdminGetStudents(token).catch(() => ({ students: [] }));
            studentsSel.innerHTML = (studentsData.students || []).map(s => `<option value="${s._id}">${s.name} (${s.email})</option>`).join('');
            const roomsData = await apiAdminGetRooms(token).catch(() => ({ rooms: [] }));
            const availableRooms = (roomsData.rooms || []).filter(r => r.capacity > (r.currentOccupancy || 0));
            roomsSel.innerHTML = availableRooms.map(r => `<option value="${r._id}">Room ${r.roomNumber} (${(r.roomType||'').toUpperCase()}) ${r.currentOccupancy || 0}/${r.capacity}</option>`).join('');
            document.getElementById('assignForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const studentId = studentsSel.value;
                const roomId = roomsSel.value;
                try {
                    await apiAdminAssignRoom(token, { studentId, roomId });
                    alert('Room assigned successfully');
                } catch (err) {
                    alert(err.message || 'Failed to assign room');
                }
            });
        });
    </script>
 </body>
 </html>
